services:
  minio:
    image: minio/minio
    container_name: cv-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  qdrant:
    image: qdrant/qdrant
    container_name: cv-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  minio_data:
  qdrant_data:
